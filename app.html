<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Smart Foodie App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-item { color: #81756d; transition: all 0.3s ease; }
        .nav-item .icon-fill { font-variation-settings: 'FILL' 0; }
        
        /* CSS khi được chọn (Active) */
        .nav-item.active { color: #765842; font-weight: bold; }
        .nav-item.active .icon-fill { font-variation-settings: 'FILL' 1; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -8px;
            width: 6px; height: 6px; background-color: #ffd6ba; border-radius: 50%;
        }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen">

    <div class="relative w-[430px] h-[90vh] bg-[#fbf9f4] overflow-hidden shadow-2xl sm:rounded-[3rem] border-[8px] border-gray-800 flex flex-col">

        <iframe id="man-hinh" src="home.html" class="w-full flex-1 border-none"></iframe>

        <nav id="bottom-nav" class="absolute bottom-0 w-full z-50 bg-white/90 backdrop-blur-xl rounded-t-3xl shadow-[0_-10px_30px_rgba(118,88,66,0.1)] flex justify-around items-center px-4 py-4 border-t border-gray-100">
            
            <div id="tab-home" onclick="changeChannel('home.html', 'tab-home')" class="nav-item active flex flex-col items-center justify-center relative cursor-pointer w-16">
                <span class="material-symbols-outlined icon-fill">home_app_logo</span>
                <span class="text-[12px] mt-1">Trang chủ</span>
            </div>
            
            <div id="tab-map" onclick="changeChannel('map.html', 'tab-map')" class="nav-item flex flex-col items-center justify-center relative cursor-pointer w-16">
                <span class="material-symbols-outlined icon-fill">map</span>
                <span class="text-[12px] mt-1">Bản đồ</span>
            </div>

            <div id="tab-planner" onclick="changeChannel('planner.html', 'tab-planner')" class="nav-item flex flex-col items-center justify-center relative cursor-pointer w-16">
                <span class="material-symbols-outlined icon-fill">calendar_today</span>
                <span class="text-[12px] mt-1">Kế hoạch</span>
            </div>

            <div id="tab-settings" onclick="changeChannel('settings.html', 'tab-settings')" class="nav-item flex flex-col items-center justify-center relative cursor-pointer w-16">
                <span class="material-symbols-outlined icon-fill">settings</span>
                <span class="text-[12px] mt-1">Cài đặt</span>
            </div>

        </nav>
    </div>

    <script>
        function changeChannel(url, tabId) {
            // 1. Chuyển kênh
            document.getElementById('man-hinh').src = url;

            // 2. Danh sách các trang GIẤU Nav (không có login nữa)
            const hiddenNavPages = ['detail.html'];
            
            // 3. Phép thuật Ẩn/Hiện
            const navBar = document.getElementById('bottom-nav');
            if (navBar) { // Kiểm tra xem có tìm thấy Nav không
                if (hiddenNavPages.includes(url)) {
                    navBar.style.display = 'none'; // Giấu Nav đi
                } else {
                    navBar.style.display = 'flex'; // Hiện Nav lên
                }
            }

            // 4. Đổi màu nút
            const tabs = document.querySelectorAll('.nav-item');
            tabs.forEach(tab => tab.classList.remove('active'));
            if(tabId) {
                document.getElementById(tabId).classList.add('active');
            }
        }
    </script>
</body>
</html>
