<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/60 backdrop-blur-xl shadow-[0_20px_40px_-15px_rgba(118,88,66,0.08)]">
<div class="flex items-center justify-between px-container-padding h-16 w-full max-w-md mx-auto">
<button onclick="window.parent.changeChannel('home.html', 'tab-home')" class="text-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Gợi ý cho bạn</h1>
<button class="text-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">restaurant_menu</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto pt-20 px-container-padding space-y-6 pb-10">

<!-- Loading State -->
<div id="loading-state" class="flex flex-col items-center justify-center py-20 space-y-4">
  <div class="w-16 h-16 border-4 border-primary-container border-t-primary rounded-full animate-spin"></div>
  <p class="font-body-md text-on-surface-variant">Đang phân tích với Fuzzy Logic...</p>
</div>

<!-- Results (hidden initially) -->
<div id="results-state" class="hidden space-y-6">

<!-- AI Score Section -->
<div class="relative overflow-hidden rounded-xl mesh-gradient-bg p-6 text-center shadow-lg border border-white/40">
<div class="relative z-10 flex flex-col items-center">
<div class="text-on-surface-variant font-label-lg text-label-lg mb-1 uppercase tracking-wider">Độ tương thích AI</div>
<div class="flex items-center justify-center gap-2">
<span class="text-[48px] font-bold text-primary leading-tight" id="ai-score">--</span>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2" id="ai-explain">Dựa trên thói quen ăn uống và điều kiện thời tiết hiện tại.</p>
</div>
</div>

<!-- Best Recommendation -->
<section id="best-dish-section">
<h2 class="font-label-lg text-label-lg text-on-surface-variant mb-4 uppercase tracking-widest">Lựa chọn tốt nhất</h2>
<div class="bg-surface-container-lowest rounded-lg overflow-hidden shadow-[0_20px_50px_rgba(118,88,66,0.1)] border border-outline-variant/30">
<div class="relative aspect-[16/10] overflow-hidden bg-surface-container-highest">
  <div class="w-full h-full flex items-center justify-center">
    <span class="material-symbols-outlined text-outline text-6xl">restaurant</span>
  </div>
</div>
<div class="p-4 space-y-3">
<div class="flex justify-between items-start">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface" id="best-name">--</h3>
<div class="flex items-center gap-3 text-on-surface-variant/70 mt-1">
<span class="flex items-center gap-1 font-body-sm text-body-sm"><span class="material-symbols-outlined text-[18px]">local_fire_department</span> <span id="best-calo">--</span> kcal</span>
<span class="flex items-center gap-1 font-body-sm text-body-sm"><span class="material-symbols-outlined text-[18px]">schedule</span> <span id="best-time">--</span> phút</span>
</div>
</div>
<div class="text-right">
<div class="text-primary font-headline-md text-headline-md" id="best-price">--đ</div>
<div class="text-on-surface-variant/60 font-body-sm text-body-sm" id="best-rest">--</div>
</div>
</div>
<button onclick="window.parent.changeChannel('detail.html')" class="w-full bg-primary-container text-on-primary-container py-3 rounded-full font-label-lg text-label-lg active:scale-95 transition-all shadow-sm">Đặt món ngay</button>
</div>
</div>
</section>

<!-- Other Recommendations -->

<h2 class="font-label-lg text-label-lg text-on-surface-variant mb-4 uppercase tracking-widest">Các đề xuất khác</h2>
<div id="other-dishes" class="space-y-3"></div>
</section>

</div><!-- end results-state -->

<script>
const FOOD_IMGS = [
  'https://lh3.googleusercontent.com/aida-public/AB6AXuCp9Ie70zQhA3z732uwqb5DqONyYWDWLvVAOHrkpKoBAkEK33e8h3gCK_OQA_xH-lWinnPSoBzWh8hWrZ3IjNvbpKWYo4fMMj2WQFiWTlTSjdzOuYtb4QF8aGonKkwIGKfF_NVMS19CRAiFYb-Wypgf8ijQsc19GNObpgMf0cVFJGY5JBoQVYdW3xthiswv0ipdgxcWM4pxfJ3NIwgWgFN856llaN1Kp6otsC8p5y4Zb0M59N5vLZz0r300YxiflP7cUzgMAJHB6qE',
  'https://lh3.googleusercontent.com/aida-public/AB6AXuDOx0Sv7T5FrDrkETVFzxP1OtAy8HsMlGU2OYVlJ2umuOV1SN3VDO8OUMwBff3wKl5cBtaZ-EqK8alxrGclYTAG6nCW_Fy3xbhux4Tbs3N4f8PvJEjdWVoUrV5XaLys1xuKtWZxcwlDsi2_ceBhT4Ws4WIpg_rbAAGzNxol18dtY9LTeMionKPVohJhixgQfSsHpXri2ZI51tEHIDy1JF2HYKhM0U_mSi1VtNOpJ_XdrqJ9W-1aiKmmIIICf6Y1LlZVhj9cN1gNuMU',
  'https://lh3.googleusercontent.com/aida-public/AB6AXuBYwF2sN4XIoizoz6tr7EmkaEl_4HIHzzfwlJ_IJN-wdIfr31xC780QfLkderqKEfSh6tCPzUhaCXtfZnV4qXFxcltzF1NRMXsGTWB4WgnbUbjGxFhlMh5OzWcFwkABVPXJ_U-OdKVTrc43IiHPi6U7r8mBXB0amXYgL4nEtCdvfKUd3gx21Mws6vtxTFstfwBO26mHNPq0c8wgU-59QUPO48_30Apa6I9vtfJ1Yv95cFYkqswBa0TyMTXY2YbywmGjEimS_F8UZz4',
];

async function loadRecommendations() {
  const params = JSON.parse(sessionStorage.getItem('fuzzyParams') || '{}');
  const payload = {
    hunger: parseFloat(params.hunger || 7),
    time_avail: parseFloat(params.time_avail || 45),
    budget: parseFloat(params.budget || 150000),
    health: params.health || 'Balanced',
  };

  // Thêm weather nếu có
  const weather = JSON.parse(sessionStorage.getItem('weatherData') || '{}');
  if (weather.weather) payload.weather = weather.weather;

  try {
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    renderResults(data);
  } catch(e) {
    document.getElementById('loading-state').innerHTML = '<p class="text-error text-center py-10">Lỗi kết nối server. Hãy chạy backend trước!</p>';
  }
}

function renderResults(data) {
  document.getElementById('loading-state').classList.add('hidden');
  document.getElementById('results-state').classList.remove('hidden');

  const results = data.results || [];
  if (!results.length) return;

  // Score
  const urgency = data.urgency || 0;
  const score = Math.round(100 - urgency * 5);
  document.getElementById('ai-score').textContent = score + '%';

  const w = data.weather || {};
  const wText = w.weather === 'Rain' || w.weather === 'Drizzle' ? 'Trời mưa - ưu tiên món nóng, giao nhanh!' :
                w.weather === 'Clear' ? 'Trời đẹp - mọi món đều phù hợp!' :
                'Dựa trên thời tiết và mức độ đói của bạn.';
  document.getElementById('ai-explain').textContent = wText;

  // Best dish
  const best = results[0];
  document.getElementById('best-name').textContent = best.name;
  document.getElementById('best-calo').textContent = best.calo;
  document.getElementById('best-time').textContent = Math.round(best.delivery_time);
  document.getElementById('best-price').textContent = best.price.toLocaleString('vi-VN') + 'đ';
  document.getElementById('best-rest').textContent = '🏪 ' + (best.rest_name || '');

  // Other dishes
  const container = document.getElementById('other-dishes');
  container.innerHTML = '';
  results.slice(1, 5).forEach((dish, i) => {
    const matchPct = Math.round(100 - (i+1)*4);
    container.innerHTML += \`
    <div class="bg-surface-container-lowest p-3 rounded-lg flex gap-4 shadow-sm border border-outline-variant/20 active:scale-[0.98] transition-transform">
      <div class="w-24 h-24 rounded-lg overflow-hidden shrink-0 relative bg-surface-container-highest flex items-center justify-center">
        <img src="\${FOOD_IMGS[i % FOOD_IMGS.length]}" class="w-full h-full object-cover" alt="\${dish.name}" onerror="this.style.display='none'">
        <div class="absolute top-1 right-1 bg-white/70 backdrop-blur-sm text-primary font-label-md text-[10px] px-1.5 py-0.5 rounded-full">\${matchPct}% Match</div>
      </div>
      <div class="flex-1 flex flex-col justify-between">
        <div>
          <h4 class="font-label-lg text-label-lg text-on-surface line-clamp-1">\${dish.name}</h4>
          <div class="flex gap-2 mt-1">
            <span class="text-on-surface-variant/60 font-body-sm text-body-sm">\${dish.calo} kcal</span>
            <span class="text-on-surface-variant/60">•</span>
            <span class="text-on-surface-variant/60 font-body-sm text-body-sm">\${Math.round(dish.delivery_time)} phút</span>
            <span class="text-on-surface-variant/60">•</span>
            <span class="text-on-surface-variant/60 font-body-sm text-body-sm">\${dish.distance_km}km</span>
          </div>
          <p class="text-on-surface-variant/50 font-body-sm text-[11px] mt-0.5">\${dish.rest_name}</p>
        </div>
        <div class="flex justify-between items-end">
          <span class="font-label-lg text-label-lg text-primary">\${dish.price.toLocaleString('vi-VN')}đ</span>
          <button class="bg-surface-container text-on-surface-variant p-1.5 rounded-lg active:scale-95 transition-all shadow-sm border border-outline-variant/10">
            <span class="material-symbols-outlined text-[20px] font-bold">add</span>
          </button>
        </div>
      </div>
    </div>\`;
  });
}

loadRecommendations();
</script>
</body></html>
