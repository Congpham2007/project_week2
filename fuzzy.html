<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="navigation.js" defer></script>
<script src="api.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  ::-webkit-scrollbar { display: none; }
  html, body { -ms-overflow-style: none; scrollbar-width: none; overflow-x: hidden; }
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .mesh-gradient-bg {
      background: radial-gradient(at 0% 0%, #ffd6ba 0%, transparent 50%),
                  radial-gradient(at 100% 0%, #e8d7ff 0%, transparent 50%),
                  radial-gradient(at 50% 100%, #b4eee2 0%, transparent 50%);
  }
</style>
</head>
<body class="bg-[#fbf9f4] text-[#1b1c19] min-h-screen pb-24">
<header class="fixed top-0 w-full z-50 bg-[#fbf9f4]/85 backdrop-blur-xl shadow-[0_20px_40px_-15px_rgba(118,88,66,0.08)]">
<div class="flex items-center justify-between px-5 h-16 w-full max-w-md mx-auto">
<button onclick="navigateTo('home.html', 'tab-home')" class="text-[#765842] active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-[22px] font-semibold text-[#3f2c22]">Gợi ý cho bạn</h1>
<button class="text-[#765842] active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">restaurant_menu</span>
</button>
</div>
</header>

<main class="max-w-md mx-auto pt-20 px-5 space-y-6">
<div id="reason-box" class="bg-[#fff1e4] border border-[#ead8cb] rounded-2xl p-4 flex items-start gap-3 text-[#6f5544]">
<span class="material-symbols-outlined text-[#8a6547]" style="font-variation-settings:'FILL' 1;">info</span>
<p class="text-sm leading-6">Đang lấy kết quả fuzzy từ backend…</p>
</div>

<div class="relative overflow-hidden rounded-xl mesh-gradient-bg p-6 text-center shadow-lg border border-white/40">
<div class="relative z-10 flex flex-col items-center">
<div class="text-[#6d5a4e] text-sm font-semibold mb-1 uppercase tracking-wider">Độ tương thích AI</div>
<div class="flex items-center justify-center gap-2">
<span id="match-score" class="text-[48px] font-bold text-[#3f2c22] leading-tight">--%</span>
<span class="material-symbols-outlined text-[#8a6547] text-3xl" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
</div>
<p id="insight-text" class="text-sm text-[#5f5148] mt-2 leading-6">Phân tích theo độ đói, thời gian, ngân sách và thời tiết thực tế.</p>
</div>
</div>

<section>
<h2 class="text-sm font-semibold text-[#7d6d63] mb-4 uppercase tracking-widest">Lựa chọn tốt nhất</h2>
<div id="best-choice"></div>
</section>

<section class="space-y-4">
<h2 class="text-sm font-semibold text-[#7d6d63] mb-4 uppercase tracking-widest">Các đề xuất khác</h2>
<div id="other-choices" class="space-y-4"></div>
</section>
</main>

<script>
function fallbackImage(type) {
  return type === "fast"
    ? "https://images.unsplash.com/photo-1512058564366-c9e2c0cf0f12?auto=format&fit=crop&w=900&q=80"
    : "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=80";
}

function selectDish(item) {
  smartFoodStore.setStored(smartFoodApi.STORAGE_KEYS.selectedDish, item);
  navigateTo("detail.html");
}

function bestCard(item) {
  return `
    <div class="bg-white rounded-[22px] overflow-hidden shadow-[0_20px_50px_rgba(118,88,66,0.1)] border border-[#eadfd5]">
      <div class="relative aspect-[16/10] overflow-hidden">
        <img alt="${item.name}" class="w-full h-full object-cover" src="${fallbackImage(item.meal_type)}">
        <div class="absolute top-4 right-4 bg-[#ffe1ca] text-[#7a5b45] text-sm font-semibold px-3 py-1 rounded-full backdrop-blur-md shadow-sm">
          ${smartFoodUtils.buildMatch(0, item.match_pct)}
        </div>
      </div>
      <div class="p-4 space-y-3">
        <div class="flex justify-between items-start gap-3">
          <div>
            <h3 class="text-[22px] leading-[28px] font-semibold text-[#2e2018]">${item.name}</h3>
            <div class="flex items-center gap-3 text-[#7d6d63] mt-1 flex-wrap text-sm">
              <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">local_fire_department</span>${item.calo} kcal</span>
              <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">schedule</span>${Math.round(item.delivery_time)} phút</span>
            </div>
            <p class="mt-2 text-sm text-[#7d6d63]">${item.rest_name} • Cách ${item.distance_km}km</p>
          </div>
          <div class="text-right shrink-0">
            <div class="text-[#8a6547] text-[22px] font-semibold">${smartFoodUtils.formatPrice(item.price)}</div>
          </div>
        </div>
        <button onclick='selectDish(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="w-full bg-[#ffd6ba] text-[#7a5b45] py-3 rounded-full text-sm font-semibold active:scale-95 transition-all shadow-sm">Đặt món ngay</button>
      </div>
    </div>`;
}

function smallCard(item, index) {
  return `
    <div class="bg-white p-3 rounded-[20px] flex gap-4 shadow-sm border border-[#eadfd5] active:scale-[0.98] transition-transform">
      <div class="w-24 h-24 rounded-lg overflow-hidden shrink-0 relative">
        <img alt="${item.name}" class="w-full h-full object-cover" src="${fallbackImage(item.meal_type)}">
        <div class="absolute top-1 right-1 bg-white/80 backdrop-blur-sm text-[#8a6547] text-[10px] font-semibold px-1.5 py-0.5 rounded-full">${smartFoodUtils.buildMatch(index + 1, item.match_pct)}</div>
      </div>
      <div class="flex-1 flex flex-col justify-between">
        <div>
          <div class="flex justify-between items-start gap-2">
            <h4 class="text-[16px] leading-[22px] font-semibold text-[#2e2018] line-clamp-2">${item.name}</h4>
          </div>
          <div class="flex gap-2 mt-1 flex-wrap text-sm">
            <span class="text-[#8d7d72]">${item.calo} kcal</span>
            <span class="text-[#8d7d72]">•</span>
            <span class="text-[#8d7d72]">${Math.round(item.delivery_time)} phút</span>
          </div>
          <p class="mt-1 text-xs text-[#8d7d72]">${item.rest_name}</p>
        </div>
        <div class="flex justify-between items-end">
          <span class="text-sm font-semibold text-[#8a6547]">${smartFoodUtils.formatPrice(item.price)}</span>
          <button onclick='selectDish(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-[#f6efe8] text-[#7d6d63] p-1.5 rounded-lg active:scale-95 transition-all shadow-sm border border-[#eadfd5]">
            <span class="material-symbols-outlined text-[20px] font-bold">add</span>
          </button>
        </div>
      </div>
    </div>`;
}

async function ensureRecommendation() {
  let recommendation = smartFoodStore.getStored(smartFoodApi.STORAGE_KEYS.recommend);
  if (recommendation && recommendation.results?.length) return recommendation;

  const payload = smartFoodStore.getStored(smartFoodApi.STORAGE_KEYS.recommendPayload, {
    hunger: 7,
    time_avail: 30,
    budget: 300000,
    health: "Balanced"
  });

  recommendation = await smartFoodApi.getRecommend(payload);
  smartFoodStore.setStored(smartFoodApi.STORAGE_KEYS.recommend, recommendation);
  return recommendation;
}

async function hydrateRecommendation() {
  try {
    const recommendation = await ensureRecommendation();
    const weather = recommendation.weather || smartFoodStore.getStored(smartFoodApi.STORAGE_KEYS.weather);
    const best = recommendation.results?.[0];
    const others = recommendation.results?.slice(1, 6) || [];

    document.getElementById("reason-box").innerHTML = `
      <span class="material-symbols-outlined text-[#8a6547]" style="font-variation-settings:'FILL' 1;">info</span>
      <p class="text-sm leading-6 text-[#6f5544]">
        Đề xuất vì thời tiết hiện tại là ${weather?.weather_vi || weather?.weather || "ổn định"}, độ khẩn cấp bữa ăn ở mức ${recommendation.urgency || "--"} và ngân sách phù hợp.
      </p>`;

    document.getElementById("match-score").textContent = `${Math.round(best?.match_pct || 96)}%`;
    document.getElementById("insight-text").textContent = `Fuzzy logic đang ưu tiên món ${best?.meal_type === "fast" ? "ăn nhanh" : "bữa đầy đủ"} với mục tiêu khoảng ${Math.round(recommendation.cal_target || best?.calo || 0)} kcal.`;
    document.getElementById("best-choice").innerHTML = best ? bestCard(best) : "";
    document.getElementById("other-choices").innerHTML = others.map((item, index) => smallCard(item, index)).join("");
  } catch (error) {
    document.getElementById("reason-box").innerHTML = `
      <span class="material-symbols-outlined text-[#ba1a1a]" style="font-variation-settings:'FILL' 1;">error</span>
      <p class="text-sm leading-6 text-[#6f5544]">Không tải được dữ liệu fuzzy từ backend: ${error.message}</p>`;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  window.selectDish = selectDish;
  hydrateRecommendation();
});
</script>
</body>
</html>
