<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Thực đơn - Kế hoạch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="navigation.js" defer></script>
    <script src="api.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #fffdfa 0%, #f5efea 100%);
        }

        .stats-card,
        .meal-card,
        .panel {
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 18px 38px rgba(118, 88, 66, 0.08);
        }

        .pill-bar {
            border-radius: 9999px 9999px 18px 18px;
        }

        .chart-card {
            overflow: hidden;
        }

        .kpi-track {
            position: relative;
            width: 28px;
            height: 112px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .kpi-target {
            width: 28px;
            border-radius: 9999px 9999px 16px 16px;
            background: #ded9d4;
        }

        .kpi-actual {
            position: absolute;
            bottom: 0;
            width: 18px;
            border-radius: 9999px 9999px 14px 14px;
            background: #74cdb9;
            box-shadow: 0 8px 18px rgba(116, 205, 185, 0.2);
        }

        .nav-item {
            color: #8d7d72;
        }

        .nav-item.active {
            color: #765842;
            font-weight: 700;
        }

        .macro-pill {
            box-shadow: 0 14px 28px rgba(118, 88, 66, 0.08);
        }
    </style>
</head>
<body class="text-[#1b1c19]">
    <div class="w-full max-w-[430px] min-h-screen mx-auto bg-[#fbf9f4] pb-28">
        <header class="px-5 pt-5 pb-1">
            <div class="flex items-center justify-between">
                <button onclick="navigateTo('home.html', 'tab-home')" class="w-10 h-10 rounded-full border border-[#eaded5] bg-white flex items-center justify-center text-[#8a6547]">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h1 class="text-[24px] leading-[30px] font-bold text-[#765842]">Khám phá</h1>
                <button class="w-10 h-10 rounded-full border border-[#eaded5] bg-white flex items-center justify-center text-[#8a6547]">
                    <span class="material-symbols-outlined">search</span>
                </button>
            </div>
        </header>

        <main class="px-5 pt-2">
            <section class="space-y-1 mb-5">
                <h2 class="text-[34px] leading-[40px] font-bold text-[#241814]">Kế hoạch hôm nay</h2>
                <p id="planner-date" class="text-[13px] text-[#8d7d72]">Đang tải dữ liệu từ backend…</p>
            </section>

            <section class="grid grid-cols-2 gap-4 mb-5">
                <div class="stats-card rounded-[28px] border border-[#eee2d8] p-5 flex flex-col items-center justify-center text-center">
                    <p class="text-sm font-semibold uppercase tracking-[0.16em] text-[#7f7066] mb-3">Đã nạp</p>
                    <div class="relative w-28 h-28 flex items-center justify-center">
                        <div class="absolute inset-0 rounded-full border-[6px] border-[#ffd6ba]"></div>
                        <div id="calorie-ring" class="absolute inset-0 rounded-full border-[6px] border-[#765842]" style="clip-path: polygon(0 0, 100% 0, 100% 56%, 0 56%);"></div>
                        <div class="flex flex-col items-center">
                            <span id="planner-total-cal" class="text-[32px] leading-[36px] font-bold text-[#765842]">0</span>
                            <span class="text-sm text-[#7f7066]">/ <span id="planner-goal-cal">2,000</span></span>
                        </div>
                    </div>
                    <p class="mt-3 text-[16px] font-medium text-[#765842]">kcal</p>
                </div>

                <div class="space-y-4 flex flex-col justify-between">
                    <div class="macro-pill rounded-full bg-[#d8f3eb] px-5 py-4 flex items-center justify-between text-[#2c6a61]">
                        <span class="text-[16px] font-medium">Carbs</span>
                        <span id="macro-carbs" class="text-[16px] font-bold">0g</span>
                    </div>
                    <div class="macro-pill rounded-full bg-[#ffe7d7] px-5 py-4 flex items-center justify-between text-[#8a6547]">
                        <span class="text-[16px] font-medium">Protein</span>
                        <span id="macro-protein" class="text-[16px] font-bold">0g</span>
                    </div>
                    <div class="macro-pill rounded-full bg-[#efe2fb] px-5 py-4 flex items-center justify-between text-[#6f5a93]">
                        <span class="text-[16px] font-medium">Fat</span>
                        <span id="macro-fat" class="text-[16px] font-bold">0g</span>
                    </div>
                </div>
            </section>

            <section class="rounded-[32px] bg-[#e6d2ff] p-5 relative overflow-hidden shadow-[0_18px_38px_rgba(118,88,66,0.08)] mb-6">
                <div class="absolute -right-10 -top-10 w-28 h-28 rounded-full bg-white/20 blur-xl"></div>
                <div class="relative z-10 flex items-start gap-4">
                    <div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-[#6f5a93] shadow-sm shrink-0">
                        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">auto_awesome</span>
                    </div>
                    <div>
                        <h3 class="text-[16px] font-semibold text-[#5f4c84]">Gợi ý thông minh từ AI</h3>
                        <p id="planner-ai-note" class="mt-2 text-[15px] leading-7 text-[#6f5a93]">Đang tạo gợi ý bữa ăn theo dữ liệu backend…</p>
                    </div>
                </div>
            </section>

            <section class="mb-4 flex items-center justify-between">
                <div>
                    <h2 class="text-[34px] leading-[38px] font-bold text-[#241814]">Thực đơn</h2>
                    <p class="mt-1 text-[13px] text-[#8d7d72]">Meal plan lấy từ backend, chart tuần là mock KPI</p>
                </div>
                <button id="reload-plan-btn" class="text-sm font-semibold text-[#8a6547]">Tải lại</button>
            </section>

            <section id="meal-list" class="space-y-4"></section>

            <section class="panel chart-card rounded-[28px] border border-white/70 p-4 mt-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-[22px] leading-[28px] font-semibold text-[#473328]">Phân tích tuần</h3>
                    <span class="text-xs uppercase tracking-[0.16em] text-[#9c8a7d]">Mock</span>
                </div>

                <div id="weekly-chart" class="mt-4 h-[166px] grid grid-cols-7 gap-1 items-end"></div>

                <div class="mt-3 flex items-center justify-center gap-4 text-[13px] text-[#7f7066]">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#74cdb9]"></span>
                        <span>Thực tế</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#ded9d4]"></span>
                        <span>Mục tiêu</span>
                    </div>
                </div>
            </section>
        </main>

        <nav id="standalone-nav" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/92 backdrop-blur-xl border-t border-[#efe7df] rounded-t-[28px] px-4 py-4 shadow-[0_-10px_30px_rgba(118,88,66,0.12)]">
            <div class="flex items-center justify-around">
                <button data-tab="tab-home" onclick="navigateTo('home.html', 'tab-home')" class="nav-item flex flex-col items-center gap-1">
                    <span class="material-symbols-outlined">home_app_logo</span>
                    <span class="text-[12px]">Trang chủ</span>
                </button>
                <button data-tab="tab-map" onclick="navigateTo('map.html', 'tab-map')" class="nav-item flex flex-col items-center gap-1">
                    <span class="material-symbols-outlined">map</span>
                    <span class="text-[12px]">Bản đồ</span>
                </button>
                <button data-tab="tab-planner" onclick="navigateTo('planner.html', 'tab-planner')" class="nav-item flex flex-col items-center gap-1">
                    <span class="material-symbols-outlined">calendar_today</span>
                    <span class="text-[12px]">Kế hoạch</span>
                </button>
                <button data-tab="tab-settings" onclick="navigateTo('settings.html', 'tab-settings')" class="nav-item flex flex-col items-center gap-1">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-[12px]">Cài đặt</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        const mealImages = {
            Breakfast: "https://lh3.googleusercontent.com/aida-public/AB6AXuACFMRr20gAi1XL0t3zu4NEEVhSeKK4cTG4TGHq9ehwG6U0nIeSwQGg1MfPjlMU0lNo7FuI5MRRzcdn5jjyafoMBsP3Xonvc0gnMhV-t_6QUR2ji8atTw4yHA1WKSIAPhUQ2gJDRwL8kFq_EXvOngKvQYcuBC6LJldClAjR0cS3UJGaywURPmpRjJBYHU81Uo0kdC4PcYvB6oCicoJMpPoSRCkHUCtiSodXWDfoZMH90yWdZiGjV-ePyt8_uke0l7lcQL7xjlZUEmE",
            Lunch: "https://lh3.googleusercontent.com/aida-public/AB6AXuD6hyxB9vG4BkneKdlNYPAlwuuL6cOSPXH_4oKlR52hLrOqjrWWtX-1ygmePulFBOLxoVIO0cPxo974V6MvCjz7fv9rYeiArH6nm54wHrBZj-QOhCPDnIyU9qEO2mw-ct_c7JypyYWXNEin68hP0Jvpogr5DJf5Umk-0y1DmwmVWJzUUfdJAouedC_E923PUJCIkXEBBsa9E6v2aAF_6u3URStXPyhogguEcGcR_mBEp7w1tOlwDdqNHC35_t1KT4F4MfWuP8urE_Y",
            Dinner: "https://lh3.googleusercontent.com/aida-public/AB6AXuBbq0WKmwl75TinKgF3rQMUyPUDD_1Gy4wvQQJu5vllc-TTzraKP2J-5mk6kf5cFI2ALNzUzukhsWOAGMugVq6BybZor-STsKj5BoBidN9VYjQJAjd6ju0VqKmJtIZKudEoMU2dwJZDlxLbyrjmSUp1jOrgOqvesy811syuV2K9VCVKCI1tNIhwSfJ5okETic9nFd5yABaYf3t5lAMMAVPaR8gHBuHGH2o7Z1iPTIxyG8-_uZGEYfZ3VuaBPCbP37X8fZAs1cOtNlU"
        };

        const weeklyData = [
            { day: "T2", actual: 62, target: 98 },
            { day: "T3", actual: 58, target: 92 },
            { day: "T4", actual: 71, target: 90 },
            { day: "T5", actual: 84, target: 104 },
            { day: "T6", actual: 49, target: 78 },
            { day: "T7", actual: 54, target: 74 },
            { day: "CN", actual: 45, target: 66 }
        ];

        function labelFromPeriod(period) {
            return {
                Breakfast: "Bữa sáng",
                Lunch: "Bữa trưa",
                Dinner: "Bữa tối",
                "Late Night": "Bữa khuya"
            }[period] || period;
        }

        function renderMeals(meals) {
            const mealList = document.getElementById("meal-list");
            mealList.innerHTML = meals.map((meal) => `
                <article class="meal-card rounded-[24px] border border-white/70 p-3 flex items-center gap-3">
                    <img alt="${meal.name}" class="w-14 h-14 rounded-[18px] object-cover" src="${meal.image || mealImages[meal.period] || mealImages.Breakfast}">
                    <div class="flex-1">
                        <p class="text-xs uppercase tracking-[0.18em] text-[#9c8a7d]">${meal.label || labelFromPeriod(meal.period)}</p>
                        <h3 class="mt-0.5 text-[17px] leading-[22px] font-semibold text-[#241814]">${meal.name}</h3>
                        <p class="mt-0.5 text-[16px] font-medium text-[#8a6547]">${meal.kcal || `${meal.calo} kcal`}</p>
                    </div>
                    <div class="w-9 h-9 rounded-full flex items-center justify-center" style="background:${meal.iconBg}; color:${meal.iconColor};">
                        <span class="material-symbols-outlined text-[20px]">${meal.icon}</span>
                    </div>
                </article>
            `).join("");
        }

        function renderChart() {
            const chart = document.getElementById("weekly-chart");
            chart.innerHTML = weeklyData.map((item) => `
                <div class="min-w-0 h-full flex flex-col items-center justify-end gap-2">
                    <div class="text-center leading-none space-y-1">
                        <p class="text-[11px] font-semibold text-[#8e7b6f]">${item.target}%</p>
                    </div>
                    <div class="kpi-track">
                        <div class="kpi-target" style="height:${item.target}px;"></div>
                        <div class="kpi-actual" style="height:${item.actual}px;"></div>
                    </div>
                    <p class="text-[11px] font-medium text-[#74cdb9] leading-none">${item.actual}%</p>
                    <span class="text-[11px] sm:text-xs ${item.day === 'T5' ? 'font-semibold text-[#765842]' : 'text-[#9c8a7d]'}">${item.day}</span>
                </div>
            `).join("");
        }

        function normalizePlan(plan = []) {
            return plan.slice(0, 3).map((item, index) => ({
                ...item,
                image: mealImages[item.period] || mealImages.Breakfast,
                label: labelFromPeriod(item.period),
                kcal: `${item.calo} kcal`,
                icon: index === 0 ? "check_circle" : "schedule",
                iconBg: index === 0 ? "#b4eee2" : "#fff6ef",
                iconColor: index === 0 ? "#2f685e" : "#b18b6b"
            }));
        }

        function formatToday() {
            const today = new Date();
            return today.toLocaleDateString("vi-VN", {
                weekday: "long",
                day: "numeric",
                month: "numeric"
            }).replace(/^./, (char) => char.toUpperCase());
        }

        function updatePlannerSummary(planResult) {
            const totalCalo = Number(planResult?.total_calo || 0);
            const goal = 2000;
            const progress = Math.max(12, Math.min(100, Math.round((totalCalo / goal) * 100)));
            const carbs = Math.round((totalCalo * 0.45) / 4);
            const protein = Math.round((totalCalo * 0.25) / 4);
            const fat = Math.round((totalCalo * 0.30) / 9);

            document.getElementById("planner-date").textContent = formatToday();
            document.getElementById("planner-total-cal").textContent = totalCalo.toLocaleString("vi-VN");
            document.getElementById("planner-goal-cal").textContent = goal.toLocaleString("vi-VN");
            document.getElementById("macro-carbs").textContent = `${carbs}g`;
            document.getElementById("macro-protein").textContent = `${protein}g`;
            document.getElementById("macro-fat").textContent = `${fat}g`;
            document.getElementById("calorie-ring").style.clipPath = `polygon(0 0, 100% 0, 100% ${progress}%, 0 ${progress}%)`;

            const dinner = planResult?.plan?.find((item) => item.period === "Dinner");
            if (dinner) {
                document.getElementById("planner-ai-note").textContent =
                    `Bạn còn thiếu khoảng ${Math.max(10, Math.round(protein * 0.22))}g Protein hôm nay. Thử thêm một phần ${dinner.name.toLowerCase()} vào bữa tối để cân bằng dinh dưỡng nhé.`;
            } else {
                document.getElementById("planner-ai-note").textContent =
                    "Meal plan đã được đồng bộ. Bạn có thể tải lại để lấy gợi ý bữa ăn mới từ backend.";
            }
        }

        async function loadPlan() {
            const button = document.getElementById("reload-plan-btn");
            button.textContent = "Đang tải...";
            try {
                let planResult = smartFoodStore.getStored(smartFoodApi.STORAGE_KEYS.plan);
                if (!planResult || !planResult.plan?.length) {
                    planResult = await smartFoodApi.getPlan({ profile: "Office Worker", late_night: false });
                    smartFoodStore.setStored(smartFoodApi.STORAGE_KEYS.plan, planResult);
                }
                updatePlannerSummary(planResult);
                renderMeals(normalizePlan(planResult.plan));
            } catch (error) {
                renderMeals([]);
                document.getElementById("planner-date").textContent = "Không tải được dữ liệu backend";
                document.getElementById("planner-ai-note").textContent = "Backend chưa phản hồi nên planner chưa thể tạo gợi ý hôm nay.";
                document.getElementById("meal-list").innerHTML = `<div class="text-sm text-[#8d7d72]">Không tải được kế hoạch từ backend: ${error.message}</div>`;
            } finally {
                button.textContent = "Tải lại";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadPlan();
            renderChart();
            document.getElementById("reload-plan-btn").addEventListener("click", async () => {
                sessionStorage.removeItem(smartFoodApi.STORAGE_KEYS.plan);
                await loadPlan();
            });
            setupStandaloneNav("tab-planner");
        });
    </script>
</body>
</html>
