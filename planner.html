<script>
const PERIOD_ICONS = {
  'Breakfast': '☀️', 'Lunch': '🍱', 'Dinner': '🌙', 'Late Night': '⭐'
};
const PERIOD_LABELS = {
  'Breakfast': 'Bữa sáng', 'Lunch': 'Bữa trưa', 'Dinner': 'Bữa tối', 'Late Night': 'Bữa khuya'
};
const MEAL_IMGS = [
  'https://lh3.googleusercontent.com/aida-public/AB6AXuACFMRr20gAi1XL0t3zu4NEEVhSeKK4cTG4TGHq9ehwG6U0nIeSwQGg1MfPjlMU0lNo7FuI5MRRzcdn5jjyafoMBsP3Xonvc0gnMhV-t_6QUR2ji8atTw4yHA1WKSIAPhUQ2gJDRwL8kFq_EXvOngKvQYcuBC6LJldClAjR0cS3UJGaywURPmpRjJBYHU81Uo0kdC4PcYvB6oCicoJMpPoSRCkHUCtiSodXWDfoZMH90yWdZiGjV-ePyt8_uke0l7lcQL7xjlZUEmE',
  'https://lh3.googleusercontent.com/aida-public/AB6AXuD6hyxB9vG4BkneKdlNYPAlwuuL6cOSPXH_4oKlR52hLrOqjrWWtX-1ygmePulFBOLxoVIO0cPxo974V6MvCjz7fv9rYeiArH6nm54wHrBZj-QOhCPDnIyU9qEO2mw-ct_c7JypyYWXNEin68hP0Jvpogr5DJf5Umk-0y1DmwmVWJzUUfdJAouedC_E923PUJCIkXEBBsa9E6v2aAF_6u3URStXPyhogguEcGcR_mBEp7w1tOlwDdqNHC35_t1KT4F4MfWuP8urE_Y',
  'https://lh3.googleusercontent.com/aida-public/AB6AXuBbq0WKmwl75TinKgF3rQMUyPUDD_1Gy4wvQQJu5vllc-TTzraKP2J-5mk6kf5cFI2ALNzUzukhsWOAGMugVq6BybZor-STsKj5BoBidN9VYjQJAjd6ju0VqKmJtIZKudEoMU2dwJZDlxLbyrjmSUp1jOrgOqvesy811syuV2K9VCVKCI1tNIhwSfJ5okETic9nFd5yABaYf3t5lAMMAVPaR8gHBuHGH2o7Z1iPTIxyG8-_uZGEYfZ3VuaBPCbP37X8fZAs1cOtNlU',
  'https://lh3.googleusercontent.com/aida-public/AB6AXuCp9Ie70zQhA3z732uwqb5DqONyYWDWLvVAOHrkpKoBAkEK33e8h3gCK_OQA_xH-lWinnPSoBzWh8hWrZ3IjNvbpKWYo4fMMj2WQFiWTlTSjdzOuYtb4QF8aGonKkwIGKfF_NVMS19CRAiFYb-Wypgf8ijQsc19GNObpgMf0cVFJGY5JBoQVYdW3xthiswv0ipdgxcWM4pxfJ3NIwgWgFN856llaN1Kp6otsC8p5y4Zb0M59N5vLZz0r300YxiflP7cUzgMAJHB6qE',
];

// Cập nhật ngày hôm nay
const today = new Date();
const days = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
const months = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const el = document.getElementById('plan-date');
if (el) el.textContent = `${days[today.getDay()]}, ${today.getDate()} ${months[today.getMonth()]}`;

async function loadPlan() {
  const settings = JSON.parse(sessionStorage.getItem('fuzzyParams') || '{}');
  const profileMap = {'Diet':'Dieter','Balanced':'Office Worker','Bulking':'Gym'};
  const profile = profileMap[settings.health] || 'Office Worker';

  document.getElementById('meals-loading').classList.remove('hidden');
  document.getElementById('meals-container').classList.add('hidden');

  try {
    const res = await fetch('/api/plan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ profile, late_night: false })
    });
    const data = await res.json();
    renderPlan(data);
  } catch(e) {
    document.getElementById('meals-loading').innerHTML =
      '<p class="text-error text-center py-4">Lỗi kết nối server!</p>';
  }
}

function renderPlan(data) {
  document.getElementById('meals-loading').classList.add('hidden');
  const container = document.getElementById('meals-container');
  container.classList.remove('hidden');
  container.innerHTML = '';

  const plan = data.plan || [];
  let totalCalo = data.total_calo || 0;
  document.getElementById('total-calo').textContent = totalCalo.toLocaleString('vi-VN');

  // AI tip
  const tipEl = document.getElementById('ai-tip');
  if (tipEl) {
    const tips = [
      'Kế hoạch hôm nay được tối ưu theo Fuzzy Logic. Chúc ngon miệng!',
      `Tổng ${totalCalo} kcal hôm nay - ${totalCalo < 1800 ? 'Trong mức kiểm soát tốt!' : 'Hơi nhiều, cân nhắc bữa tối nhẹ hơn!'}`,
      'Dựa vào thời tiết và sức khỏe của bạn để gợi ý bữa ăn phù hợp nhất.',
    ];
    tipEl.textContent = tips[Math.floor(Math.random() * tips.length)];
  }

  plan.forEach((meal, i) => {
    const icon = PERIOD_ICONS[meal.period] || '🍽️';
    const label = PERIOD_LABELS[meal.period] || meal.period;
    container.innerHTML += `
    <div class="bg-surface-container-lowest rounded-xl p-3 shadow-[0_15px_35px_-10px_rgba(118,88,66,0.06)] border border-outline-variant/30 flex items-center gap-4">
      <div class="w-16 h-16 rounded-[20px] overflow-hidden shrink-0 relative bg-surface-container-highest">
        <img src="${MEAL_IMGS[i % MEAL_IMGS.length]}" class="w-full h-full object-cover" alt="${label}" onerror="this.style.display='none'">
        <div class="absolute inset-0 flex items-center justify-center text-2xl bg-surface-container/50">${icon}</div>
      </div>
      <div class="flex-1">
        <p class="font-label-sm text-label-md text-outline mb-0.5 uppercase tracking-wide">${label}</p>
        <h4 class="font-label-lg text-label-lg text-on-surface">${meal.name}</h4>
        <div class="flex gap-2 mt-1 flex-wrap">
          <p class="font-body-sm text-body-sm text-primary">${meal.calo} kcal</p>
          <span class="text-outline-variant">•</span>
          <p class="font-body-sm text-body-sm text-secondary">${meal.price.toLocaleString('vi-VN')}đ</p>
          <span class="text-outline-variant">•</span>
          <p class="font-body-sm text-body-sm text-on-surface-variant">🚚 ${Math.round(meal.delivery_time)} phút</p>
        </div>
      </div>
      <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
        <span class="material-symbols-outlined text-[18px]">restaurant</span>
      </div>
    </div>`;
  });

  // Lưu plan để map dùng
  sessionStorage.setItem('dayPlan', JSON.stringify(plan));
}

loadPlan();
</script>
</body></html>
