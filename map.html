<script>
async function loadMap() {
  const plan = JSON.parse(sessionStorage.getItem('dayPlan') || '[]');

  if (!plan.length) {
    // Nếu chưa có plan, gọi API để tạo
    try {
      const res = await fetch('/api/plan', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ profile: 'Office Worker', late_night: false })
      });
      const data = await res.json();
      const newPlan = data.plan || [];
      sessionStorage.setItem('dayPlan', JSON.stringify(newPlan));
      await createMap(newPlan);
    } catch(e) {
      showMapError('Lỗi kết nối server!');
    }
  } else {
    await createMap(plan);
  }
}

async function createMap(plan) {
  try {
    const res = await fetch('/api/map', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ items: plan })
    });
    const data = await res.json();
    if (data.map_url) {
      const iframe = document.getElementById('folium-map');
      const placeholder = document.getElementById('map-placeholder');
      iframe.src = data.map_url + '?t=' + Date.now();
      iframe.style.display = 'block';
      placeholder.style.display = 'none';

      // Update ETA info
      const totalDist = plan.reduce((s, m) => s + (m.distance_km || 0), 0).toFixed(1);
      const maxTime = Math.max(...plan.map(m => Math.round(m.delivery_time || 30)));
      document.getElementById('map-eta').textContent = `${maxTime - 5} - ${maxTime} phút`;
      document.getElementById('map-info').textContent = `${plan.length} điểm • Tổng ~${totalDist} km`;
    }
  } catch(e) {
    showMapError('Không thể tạo bản đồ!');
  }
}

function showMapError(msg) {
  document.getElementById('map-placeholder').innerHTML =
    `<span class="material-symbols-outlined text-error text-4xl">error</span><p class="text-error font-body-sm">${msg}</p>`;
}

loadMap();
</script>
