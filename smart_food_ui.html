<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Food — AI Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+Display:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0d0e;
  --panel:  #161618;
  --card:   #1e1e21;
  --border: #2a2a2f;
  --accent: #ff6b35;
  --accent2:#ffd166;
  --green:  #06d6a0;
  --blue:   #118ab2;
  --text:   #e8e8ec;
  --muted:  #6b6b7a;
  --radius: 12px;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 36px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(13,13,14,.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 18px;
}
.logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; }
.logo-text span { color: var(--accent); }

.weather-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 16px;
  font-family: var(--mono);
  font-size: .8rem;
  cursor: pointer;
  transition: border-color .2s;
}
.weather-pill:hover { border-color: var(--accent); }
.w-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

/* ── LAYOUT ──────────────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 0;
  min-height: calc(100vh - 65px);
}

/* ── SIDEBAR ─────────────────────────────────────────── */
aside {
  border-right: 1px solid var(--border);
  padding: 28px 24px;
  overflow-y: auto;
  max-height: calc(100vh - 65px);
  position: sticky; top: 65px;
}

.tabs {
  display: flex;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 8px; border: none; background: none;
  color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: .82rem; font-weight: 600; cursor: pointer;
  border-radius: 8px; transition: all .2s;
}
.tab.active {
  background: var(--accent); color: #fff;
}

.form-section { display: none; }
.form-section.active { display: block; }

.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: .75rem; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 8px;
}

/* Slider */
.slider-wrap { position: relative; }
.slider-wrap input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px; outline: none;
  cursor: pointer;
}
.slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent);
}
.slider-val {
  font-family: var(--mono);
  font-size: .9rem; font-weight: 500;
  color: var(--accent2);
  text-align: right;
  margin-top: 4px;
}

/* Select */
select {
  width: 100%; padding: 10px 14px;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: .88rem;
  cursor: pointer; outline: none; transition: border-color .2s;
}
select:focus { border-color: var(--accent); }

/* Toggle */
.toggle-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-top: 1px solid var(--border);
}
.toggle-label { font-size: .88rem; }
.toggle { position: relative; width: 42px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border); border-radius: 12px;
  cursor: pointer; transition: .3s;
}
.toggle-slider::before {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff; border-radius: 50%;
  transition: .3s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Button */
.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: var(--radius);
  font-family: 'Syne', sans-serif;
  font-size: .95rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: #e85d2a; transform: translateY(-1px); }
.btn-secondary {
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); margin-top: 10px;
}
.btn-secondary:hover { border-color: var(--green); color: var(--green); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ── CONTENT AREA ────────────────────────────────────── */
.content {
  padding: 28px 32px;
  overflow-y: auto;
  max-height: calc(100vh - 65px);
}

/* Fuzzy insight bar */
.insight-bar {
  display: flex; gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.insight-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: .78rem;
  display: flex; align-items: center; gap: 6px;
}
.chip-val { color: var(--accent2); font-weight: 500; }

/* Section heading */
.section-head {
  display: flex; align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 1.1rem; font-weight: 700; }
.section-count {
  font-family: var(--mono);
  font-size: .75rem; color: var(--muted);
}

/* ── FOOD CARDS ──────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.food-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: all .25s;
  position: relative;
  overflow: hidden;
  animation: fadeUp .4s ease both;
}
.food-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,107,53,.1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-rank {
  position: absolute; top: 12px; right: 12px;
  width: 24px; height: 24px;
  background: var(--border);
  border-radius: 50%;
  font-family: var(--mono);
  font-size: .7rem; font-weight: 500;
  display: grid; place-items: center;
  color: var(--muted);
}
.card-rank.top { background: var(--accent); color: #fff; }

.food-card h3 {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 4px; padding-right: 30px;
  line-height: 1.3;
}
.card-rest {
  font-size: .78rem; color: var(--muted);
  margin-bottom: 12px;
  font-style: italic;
}

.card-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 12px;
}
.tag {
  font-size: .7rem; font-family: var(--mono);
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg); color: var(--muted);
}
.tag.fast  { background: rgba(255,107,53,.15); color: var(--accent); }
.tag.full  { background: rgba(17,138,178,.15); color: var(--blue); }
.tag.soup  { background: rgba(6,214,160,.1);   color: var(--green); }
.tag.dry   { background: rgba(255,209,102,.1); color: var(--accent2); }

.card-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat {
  background: var(--bg);
  border-radius: 6px;
  padding: 8px 10px;
}
.stat-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.stat-val   { font-family: var(--mono); font-size: .92rem; font-weight: 500; color: var(--text); margin-top: 2px; }
.stat-val.price { color: var(--accent2); }
.stat-val.delivery { color: var(--green); }

/* ── PLAN SECTION ────────────────────────────────────── */
.plan-grid { display: flex; flex-direction: column; gap: 14px; }

.plan-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp .4s ease both;
  display: grid;
  grid-template-columns: 8px 1fr;
}
.plan-accent-bar { background: var(--accent); }
.plan-accent-bar.lunch  { background: var(--blue); }
.plan-accent-bar.dinner { background: #6c5ce7; }
.plan-accent-bar.late   { background: var(--muted); }

.plan-body { padding: 16px 18px; }
.plan-period {
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); margin-bottom: 6px;
}
.plan-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
.plan-meta {
  display: flex; flex-wrap: wrap; gap: 12px;
  font-family: var(--mono); font-size: .78rem; color: var(--muted);
}
.plan-meta span { display: flex; align-items: center; gap: 4px; }
.plan-meta .hl { color: var(--text); }

.summary-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px;
}
.summary-label { font-size: .8rem; color: var(--muted); }
.summary-val   { font-family: var(--mono); font-size: 1.2rem; font-weight: 500; color: var(--accent2); }

/* ── MAP BUTTON ──────────────────────────────────────── */
.map-btn-wrap { margin-top: 16px; }

/* ── EMPTY / LOADING STATE ────────────────────────────── */
.state-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 360px;
  color: var(--muted); text-align: center; gap: 12px;
}
.state-empty .icon { font-size: 3.5rem; }
.state-empty h2 { font-size: 1.1rem; color: var(--text); }
.state-empty p  { font-size: .85rem; max-width: 280px; line-height: 1.6; }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MAP IFRAME ──────────────────────────────────────── */
.map-frame-wrap {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  margin-top: 20px;
}
.map-frame-wrap iframe {
  width: 100%; height: 480px; border: none; display: block;
}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── TOAST ───────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: .85rem;
  transform: translateY(80px); opacity: 0;
  transition: all .3s;
  z-index: 999;
  max-width: 280px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok   { border-color: var(--green); }
.toast.err  { border-color: #ff4757; }

@media (max-width: 768px) {
  main { grid-template-columns: 1fr; }
  aside { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
  .content { max-height: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🍜</div>
    <div class="logo-text">Smart<span>Food</span></div>
  </div>
  <div class="weather-pill" onclick="refreshWeather()" title="Nhấn để làm mới thời tiết">
    <div class="w-dot"></div>
    <span id="weather-text">Đang tải thời tiết…</span>
  </div>
</header>

<main>
<!-- ── SIDEBAR ── -->
<aside>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('quick')">🍽️ Tìm Nhanh</button>
    <button class="tab" onclick="switchTab('plan')">📅 Daily Plan</button>
  </div>

  <!-- TAB 1: Quick Recommend -->
  <div class="form-section active" id="tab-quick">

    <div class="field">
      <label>Độ đói <span style="color:var(--accent2)" id="hunger-label">7 / 10</span></label>
      <div class="slider-wrap">
        <input type="range" id="hunger" min="0" max="10" step="1" value="7"
          oninput="document.getElementById('hunger-label').textContent=this.value+' / 10'">
      </div>
    </div>

    <div class="field">
      <label>Thời gian rảnh <span style="color:var(--accent2)" id="time-label">45 phút</span></label>
      <div class="slider-wrap">
        <input type="range" id="time-avail" min="5" max="120" step="5" value="45"
          oninput="document.getElementById('time-label').textContent=this.value+' phút'">
      </div>
    </div>

    <div class="field">
      <label>Ngân sách</label>
      <select id="budget">
        <option value="100000">Dưới 100k</option>
        <option value="300000">Dưới 300k</option>
        <option value="500000" selected>Dưới 500k</option>
        <option value="1000000">Dưới 1 triệu</option>
        <option value="2000000">Không giới hạn</option>
      </select>
    </div>

    <div class="field">
      <label>Mục tiêu sức khỏe</label>
      <select id="health">
        <option value="Balanced" selected>Balanced (Cân bằng)</option>
        <option value="Diet">Diet (Ăn kiêng)</option>
        <option value="Bulking">Bulking (Tăng cơ)</option>
      </select>
    </div>

    <div class="field">
      <label>Thời tiết (manual)</label>
      <select id="weather-override">
        <option value="">Tự động từ API</option>
        <option value="Clear">☀️ Nắng / Clear</option>
        <option value="Rainy">🌧️ Mưa / Rainy</option>
      </select>
    </div>

    <button class="btn btn-primary" onclick="runRecommend()" id="btn-recommend">
      🔍 TÌM MÓN NGON
    </button>
  </div>

  <!-- TAB 2: Daily Plan -->
  <div class="form-section" id="tab-plan">

    <div class="field">
      <label>Lifestyle Profile</label>
      <select id="profile">
        <option value="Office Worker" selected>💼 Office Worker</option>
        <option value="Student">🎓 Student</option>
        <option value="Gym">💪 Gym</option>
        <option value="Dieter">🥗 Dieter</option>
      </select>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">🌙 Bao gồm bữa khuya</span>
      <label class="toggle">
        <input type="checkbox" id="late-night">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" onclick="runPlan()" id="btn-plan" style="margin-top:20px">
      🚀 LẬP KẾ HOẠCH
    </button>
    <button class="btn btn-secondary" onclick="showPlanMap()" id="btn-map" disabled>
      🗺️ XEM BẢN ĐỒ LỘ TRÌNH
    </button>
  </div>
</aside>

<!-- ── CONTENT ── -->
<div class="content" id="content-area">
  <div class="state-empty" id="state-empty">
    <div class="icon">🍜</div>
    <h2>Chào mừng đến Smart Food!</h2>
    <p>Điền thông tin bên trái và nhấn <b>Tìm Món Ngon</b> hoặc <b>Lập Kế Hoạch</b> để bắt đầu.</p>
    <p style="font-size:.75rem;color:var(--muted);margin-top:8px">Powered by Fuzzy Logic (FIS 1 + FIS 2 + Delivery FIS)</p>
  </div>

  <div id="result-area" style="display:none"></div>
</div>
</main>

<div class="toast" id="toast"></div>

<script>
const API = '';  // same origin (Flask)
let planData = [];

// ── Weather ───────────────────────────────────────────────
async function loadWeather() {
  try {
    const r = await fetch(`${API}/api/weather`);
    const w = await r.json();
    const icon = w.weather === 'Rain' || w.weather === 'Rainy' ? '🌧️' :
                 w.weather === 'Clouds' ? '⛅' :
                 w.weather === 'Thunderstorm' ? '⛈️' : '☀️';
    document.getElementById('weather-text').textContent =
      `${icon} ${w.weather_vi || w.weather} · ${w.temp}°C`;
    if (w.error) document.getElementById('weather-text').textContent += ' (fallback)';
  } catch(e) {
    document.getElementById('weather-text').textContent = '⚠️ Không lấy được thời tiết';
  }
}
function refreshWeather() { showToast('🔄 Đang cập nhật thời tiết…',''); loadWeather(); }

// ── Tabs ──────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='quick'?0:1)===i));
  document.getElementById('tab-quick').classList.toggle('active', tab==='quick');
  document.getElementById('tab-plan').classList.toggle('active', tab==='plan');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Insight Bar ───────────────────────────────────────────
function buildInsightBar(data) {
  const urgLabel = data.urgency > 6.5 ? '🔴 Cao' : data.urgency > 3.5 ? '🟡 TB' : '🟢 Thấp';
  const typeLabel = data.meal_score > 5 ? 'Bữa đầy đủ' : 'Ăn nhanh';
  return `
    <div class="insight-bar">
      <div class="insight-chip">⚡ Urgency <span class="chip-val">${urgLabel} (${data.urgency})</span></div>
      <div class="insight-chip">🍽️ Loại bữa <span class="chip-val">${typeLabel}</span></div>
      <div class="insight-chip">🔥 Mục tiêu calo <span class="chip-val">${Math.round(data.cal_target)} kcal</span></div>
      <div class="insight-chip">☁️ ${data.weather.weather_vi||data.weather.weather} <span class="chip-val">${data.weather.temp}°C</span></div>
    </div>`;
}

// ── Food Card ─────────────────────────────────────────────
function buildCard(d, rank) {
  const topClass = rank <= 2 ? 'top' : '';
  const typeTag = `<span class="tag ${d.meal_type}">${d.meal_type==='fast'?'⚡ Ăn nhanh':'🍱 Đầy đủ'}</span>`;
  const styleTag = `<span class="tag ${d.style}">${d.style==='soup'?'🍲 Canh/Súp':'🥢 Khô'}</span>`;
  const priceK = (d.price/1000).toFixed(0);
  return `
    <div class="food-card" style="animation-delay:${rank*.06}s">
      <div class="card-rank ${topClass}">${rank+1}</div>
      <h3>${d.name}</h3>
      <div class="card-rest">🏪 ${d.rest_name}</div>
      <div class="card-tags">${typeTag}${styleTag}</div>
      <div class="card-stats">
        <div class="stat">
          <div class="stat-label">Giá</div>
          <div class="stat-val price">${priceK}k đ</div>
        </div>
        <div class="stat">
          <div class="stat-label">Calories</div>
          <div class="stat-val">${d.calo} kcal</div>
        </div>
        <div class="stat">
          <div class="stat-label">Giao hàng</div>
          <div class="stat-val delivery">~${d.delivery_time} phút</div>
        </div>
        <div class="stat">
          <div class="stat-label">Khoảng cách</div>
          <div class="stat-val">${d.distance_km} km</div>
        </div>
      </div>
    </div>`;
}

// ── Plan Card ──────────────────────────────────────────────
function buildPlanCard(d, i) {
  const barClass = d.period==='Lunch' ? 'lunch' : d.period==='Dinner' ? 'dinner' : d.period==='Late Night' ? 'late' : '';
  const emoji = {Breakfast:'☀️',Lunch:'🍱',Dinner:'🌙','Late Night':'⭐'}[d.period]||'🍽️';
  return `
    <div class="plan-card" style="animation-delay:${i*.1}s">
      <div class="plan-accent-bar ${barClass}"></div>
      <div class="plan-body">
        <div class="plan-period">${emoji} ${d.period}</div>
        <div class="plan-name">${d.name}</div>
        <div class="plan-meta">
          <span>🏪 ${d.rest_name}</span>
          <span>💰 <span class="hl">${(d.price/1000).toFixed(0)}k đ</span></span>
          <span>🔥 <span class="hl">${d.calo} kcal</span></span>
          <span>🚚 ~<span class="hl">${d.delivery_time} phút</span></span>
          <span>📍 <span class="hl">${d.distance_km} km</span></span>
        </div>
      </div>
    </div>`;
}

// ── Run Recommend ──────────────────────────────────────────
async function runRecommend() {
  const btn = document.getElementById('btn-recommend');
  btn.disabled = true; btn.textContent = '⏳ Đang xử lý…';

  setLoading();
  try {
    const payload = {
      hunger:    parseFloat(document.getElementById('hunger').value),
      time_avail:parseFloat(document.getElementById('time-avail').value),
      budget:    parseFloat(document.getElementById('budget').value),
      health:    document.getElementById('health').value,
      weather:   document.getElementById('weather-override').value || undefined,
    };
    const r = await fetch(`${API}/api/recommend`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!data.results) throw new Error('Không nhận được dữ liệu');

    let html = buildInsightBar(data);
    html += `<div class="section-head"><div class="section-title">Gợi ý cho bạn</div><div class="section-count">${data.results.length} kết quả</div></div>`;
    html += `<div class="cards-grid">`;
    data.results.forEach((d,i) => html += buildCard(d, i));
    html += `</div>`;
    showResult(html);
    showToast('✅ Tìm thấy ' + data.results.length + ' món!', 'ok');
  } catch(e) {
    showResult(`<div class="state-empty"><div class="icon">❌</div><h2>Lỗi kết nối</h2><p>${e.message}</p></div>`);
    showToast('❌ ' + e.message, 'err');
  }
  btn.disabled = false; btn.innerHTML = '🔍 TÌM MÓN NGON';
}

// ── Run Plan ───────────────────────────────────────────────
async function runPlan() {
  const btn = document.getElementById('btn-plan');
  btn.disabled = true; btn.textContent = '⏳ Đang lên kế hoạch…';

  setLoading();
  try {
    const payload = {
      profile:    document.getElementById('profile').value,
      late_night: document.getElementById('late-night').checked
    };
    const r = await fetch(`${API}/api/plan`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    planData = data.plan;

    const w = data.weather;
    const wIcon = w.weather === 'Rain' ? '🌧️' : w.weather === 'Clouds' ? '⛅' : '☀️';
    let html = `
      <div class="insight-bar">
        <div class="insight-chip">${wIcon} ${w.weather_vi||w.weather} <span class="chip-val">${w.temp}°C</span></div>
        <div class="insight-chip">👤 Profile <span class="chip-val">${payload.profile}</span></div>
        <div class="insight-chip">🍽️ Số bữa <span class="chip-val">${data.plan.length}</span></div>
        <div class="insight-chip">📊 Tổng calo <span class="chip-val">${data.total_calo} kcal</span></div>
      </div>
      <div class="section-head"><div class="section-title">Kế hoạch ăn hôm nay</div></div>
      <div class="plan-grid">`;
    data.plan.forEach((d,i) => html += buildPlanCard(d, i));
    html += `</div>
      <div class="summary-bar">
        <div><div class="summary-label">Tổng calo nạp</div><div class="summary-val">${data.total_calo} kcal</div></div>
        <div><div class="summary-label">Số bữa</div><div class="summary-val">${data.plan.length} bữa</div></div>
        <div><div class="summary-label">Chi phí ước tính</div><div class="summary-val">${(data.plan.reduce((s,d)=>s+d.price,0)/1000).toFixed(0)}k đ</div></div>
      </div>
      <div class="map-btn-wrap">
        <button class="btn btn-secondary" onclick="showPlanMap()">🗺️ Xem bản đồ lộ trình</button>
      </div>`;
    showResult(html);
    document.getElementById('btn-map').disabled = false;
    showToast('✅ Kế hoạch đã sẵn!', 'ok');
  } catch(e) {
    showResult(`<div class="state-empty"><div class="icon">❌</div><h2>Lỗi</h2><p>${e.message}</p></div>`);
    showToast('❌ ' + e.message, 'err');
  }
  btn.disabled = false; btn.innerHTML = '🚀 LẬP KẾ HOẠCH';
}

// ── Map ────────────────────────────────────────────────────
async function showPlanMap() {
  if (!planData.length) { showToast('⚠️ Chạy planner trước!','err'); return; }
  try {
    const r = await fetch(`${API}/api/map`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({items: planData})
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    // Append map below results without clearing
    let existing = document.getElementById('map-wrap');
    if (existing) existing.remove();

    const wrap = document.createElement('div');
    wrap.id = 'map-wrap';
    wrap.className = 'map-frame-wrap';
    wrap.innerHTML = `<iframe src="${data.map_url}?t=${Date.now()}" title="Food Map"></iframe>`;
    document.getElementById('result-area').appendChild(wrap);
    wrap.scrollIntoView({behavior:'smooth'});
    showToast('🗺️ Bản đồ đã tải!','ok');
  } catch(e) {
    showToast('❌ Không tạo được bản đồ: ' + e.message,'err');
  }
}

// ── Helpers ────────────────────────────────────────────────
function setLoading() {
  document.getElementById('state-empty').style.display = 'none';
  document.getElementById('result-area').style.display = 'flex';
  document.getElementById('result-area').style.justifyContent = 'center';
  document.getElementById('result-area').style.alignItems = 'center';
  document.getElementById('result-area').style.minHeight = '300px';
  document.getElementById('result-area').innerHTML = '<div class="spinner"></div>';
}
function showResult(html) {
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  area.style.minHeight = '';
  area.style.justifyContent = '';
  area.style.alignItems = '';
  area.innerHTML = html;
  document.getElementById('state-empty').style.display = 'none';
}

// ── Init ───────────────────────────────────────────────────
loadWeather();
</script>
</body>
</html>
